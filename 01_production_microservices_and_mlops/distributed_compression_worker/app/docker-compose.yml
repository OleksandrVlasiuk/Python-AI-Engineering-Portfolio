  worker:
    build: ./worker
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: encode_your_text
      DB_USER: root
      DB_PASS: 'uTnw0PIh65_!'
      DB_PORT: 3306
      API_URL: http://backend:8082/
    deploy:
      mode: replicated
      replicas: 3
    depends_on:
      - db
      - backend
    networks:
      - app-network

